openapi: 3.0.0
info:
  title: NovelHub API
  description: E-Kitap/Novel Okuma ve Yönetim Platformu API Dokümantasyonu
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Yerel Geliştirme Sunucusu

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    NovelInput:
      type: object
      required:
        - title
        - author
        - genres
      properties:
        title:
          type: string
          example: "Solo Leveling"
        author:
          type: string
          example: "Chugong"
        description:
          type: string
          example: "En zayıf avcının en güçlüye dönüşme hikayesi."
        genres:
          type: array
          items:
            type: string
          example: ["Aksiyon", "Fantastik"]
        status:
          type: string
          enum: [Devam Ediyor, Tamamlandı, Askıya Alındı]
          example: "Tamamlandı"

    ChapterInput:
      type: object
      required:
        - chapter_number
        - title
        - content
      properties:
        chapter_number:
          type: integer
          example: 1
        title:
          type: string
          example: "Uyanış"
        content:
          type: string
          description: "Sayfalar |||PAGE||| ayracı ile bölünmelidir."
          example: "Sistem mesajı belirdi.|||PAGE|||Görev: Hayatta Kal."

    CommentInput:
      type: object
      required:
        - text
        - rating
      properties:
        text:
          type: string
          example: "Dövüş sahneleri muazzamdı!"
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5

paths:
  /auth/register:
    post:
      summary: Yeni kullanıcı kaydı
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [reader, author]
      responses:
        '201':
          description: Başarılı kayıt

  /auth/login:
    post:
      summary: Kullanıcı girişi
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Başarılı giriş (JWT Token döner)

  /novels:
    get:
      summary: Tüm novelleri getir (Filtreleme destekler)
      tags: [Novels]
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Başlık veya yazar araması
        - in: query
          name: genre
          schema:
            type: string
          description: Türe göre filtrele
        - in: query
          name: status
          schema:
            type: string
          description: Duruma göre filtrele
        - in: query
          name: rating
          schema:
            type: integer
          description: Minimum yıldız puanına göre filtrele (Örn. 3, 4, 5)
      responses:
        '200':
          description: Novel listesi başarıyla getirildi

    post:
      summary: Yeni novel ekle (Sadece Yazarlar)
      tags: [Novels]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NovelInput'
      responses:
        '201':
          description: Novel başarıyla oluşturuldu

  /novels/{id}:
    get:
      summary: Tek bir novel detayını getir
      tags: [Novels]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Novel detayları

    put:
      summary: Noveli güncelle (Sadece Romanın Sahibi)
      tags: [Novels]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NovelInput'
      responses:
        '200':
          description: Güncelleme başarılı

    delete:
      summary: Noveli sil (Sadece Romanın Sahibi)
      tags: [Novels]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Silme başarılı

  /novels/{novelId}/chapters:
    get:
      summary: Novele ait tüm bölümleri listele
      tags: [Chapters]
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bölüm listesi getirildi
          
    post:
      summary: Novele yeni bölüm ekle (Sadece Romanın Sahibi)
      tags: [Chapters]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChapterInput'
      responses:
        '201':
          description: Bölüm başarıyla eklendi

  /chapters/{id}:
    get:
      summary: Tek bir bölümün içeriğini getir
      tags: [Chapters]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bölüm içeriği başarıyla getirildi
          
    put:
      summary: Bölümü düzenle
      tags: [Chapters]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChapterInput'
      responses:
        '200':
          description: Bölüm başarıyla güncellendi

    delete:
      summary: Bölümü sil
      tags: [Chapters]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bölüm başarıyla silindi

  /novels/{novelId}/comments:
    get:
      summary: Novele ait yorumları getir
      tags: [Comments]
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Yorumlar başarıyla getirildi

    post:
      summary: Novele yorum ve puan ekle
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentInput'
      responses:
        '201':
          description: Yorum eklendi

  /novels/comments/{id}:
    delete:
      summary: Yorumu sil (Sadece Yorum Sahibi)
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Yorum silindi