openapi: 3.0.0
info:
  title: Dijital Novel Yayın ve Yönetim Sistemi API
  description: Novel yayın platformu için RESTful API
  version: 1.0.0
servers:
  - url: http://localhost:5000/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [reader, author]
    Novel:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        author:
          type: string
        description:
          type: string
        genre:
          type: string
          enum: [Aksiyon, Fantastik, Romance, Korku, Bilim Kurgu, Gizem, Dram, Komedi]
        status:
          type: string
          enum: [Devam Ediyor, Tamamlandı, Askıya Alındı]
        created_at:
          type: string
    Chapter:
      type: object
      properties:
        id:
          type: integer
        novel_id:
          type: integer
        chapter_number:
          type: integer
        title:
          type: string
        content:
          type: string
        created_at:
          type: string
    Comment:
      type: object
      properties:
        id:
          type: integer
        novel_id:
          type: integer
        user_id:
          type: integer
        username:
          type: string
        text:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        created_at:
          type: string

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Yeni kullanıcı kaydı
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  example: furkan
                email:
                  type: string
                  example: furkan@test.com
                password:
                  type: string
                  example: "123456"
                role:
                  type: string
                  enum: [reader, author]
                  example: author
      responses:
        '201':
          description: Kayıt başarılı
        '400':
          description: Hata

  /auth/login:
    post:
      tags: [Auth]
      summary: Kullanıcı girişi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: furkan@test.com
                password:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: Giriş başarılı, token döner
        '400':
          description: Hatalı bilgi

  /novels:
    get:
      tags: [Novels]
      summary: Tüm novelleri listele
      parameters:
        - in: query
          name: genre
          schema:
            type: string
          example: Fantastik
        - in: query
          name: status
          schema:
            type: string
          example: Devam Ediyor
        - in: query
          name: search
          schema:
            type: string
          example: Solo
      responses:
        '200':
          description: Novel listesi
    post:
      tags: [Novels]
      summary: Yeni novel oluştur
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, author]
              properties:
                title:
                  type: string
                  example: Solo Leveling
                author:
                  type: string
                  example: Chugong
                description:
                  type: string
                  example: Hunters dünyası
                genre:
                  type: string
                  example: Fantastik
                status:
                  type: string
                  example: Tamamlandı
      responses:
        '201':
          description: Novel oluşturuldu
        '400':
          description: Hata
        '401':
          description: Token gerekli

  /novels/{id}:
    get:
      tags: [Novels]
      summary: Novel detayı
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Novel detayı
        '404':
          description: Novel bulunamadı
    put:
      tags: [Novels]
      summary: Novel güncelle
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                description:
                  type: string
                genre:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Novel güncellendi
        '400':
          description: Hata
    delete:
      tags: [Novels]
      summary: Novel sil
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Novel silindi
        '400':
          description: Hata

  /novels/{novelId}/chapters:
    get:
      tags: [Chapters]
      summary: Novelin bölümlerini listele
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bölüm listesi
    post:
      tags: [Chapters]
      summary: Yeni bölüm ekle
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapter_number, title, content]
              properties:
                chapter_number:
                  type: integer
                  example: 1
                title:
                  type: string
                  example: Başlangıç
                content:
                  type: string
                  example: Bu hikayenin ilk bölümüdür...
      responses:
        '201':
          description: Bölüm oluşturuldu
        '400':
          description: Hata

  /chapters/{id}:
    get:
      tags: [Chapters]
      summary: Bölüm detayı
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bölüm detayı
        '404':
          description: Bölüm bulunamadı
    put:
      tags: [Chapters]
      summary: Bölüm güncelle
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
      responses:
        '200':
          description: Bölüm güncellendi
        '400':
          description: Hata
    delete:
      tags: [Chapters]
      summary: Bölüm sil
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bölüm silindi
        '400':
          description: Hata

  /novels/{novelId}/comments:
    get:
      tags: [Comments]
      summary: Novelin yorumlarını listele
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Yorum listesi
    post:
      tags: [Comments]
      summary: Yorum ekle
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: novelId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, rating]
              properties:
                text:
                  type: string
                  example: Harika bir novel!
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
      responses:
        '201':
          description: Yorum eklendi
        '400':
          description: Hata

  /novels/comments/{id}:
    delete:
      tags: [Comments]
      summary: Yorum sil
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Yorum silindi
        '400':
          description: Hata